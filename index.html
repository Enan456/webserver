    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {

        #terminal {
            width: 100%;

            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-bottom: 0;

            padding-right: env(safe-area-inset-right, 12px);

        #output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;

        /* Spacer pushes content to bottom when output is short */
        #output-spacer {
            flex: 1;
            min-height: 0;
        }

        #output-inner {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            scrollbar-width: thin;
            scrollbar-color: #333 #0a0a0a;
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: #0a0a0a; }
        #output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .line { min-height: 1.5em; }

        /* Input row flows inline inside #output, not pinned to bottom */
        #input-row {
            display: flex;
            align-items: center;
            min-height: 1.5em;
            width: 100%;
        }

        #input-row.hidden { display: none; }

        /* Zsh-style two-line prompt */
        .prompt { color: #5faf5f; white-space: nowrap; }
        .prompt .user { color: #5fafff; }
        .prompt .host { color: #5faf5f; }

        .prompt .arrow { color: #5faf5f; }

        .prompt-top { color: #555; margin-bottom: 0; min-height: 1.3em; }

        /* Tmux-style status bar */
        #tmux-bar {
            flex-shrink: 0;
            background: #1c1c1c;
            color: #808080;
            font-size: 0.85em;
            padding: 2px 8px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #2a2a2a;
        }
        #tmux-bar .tmux-left { color: #5faf5f; }
        #tmux-bar .tmux-mid { color: #c8c8c8; }
        #tmux-bar .tmux-right { color: #808080; }

        #cmd {
            flex: 1;
            min-width: 0;
            width: 100%;
            background: transparent !important;
            background-color: transparent !important;
            border: none;
            outline: none;
            color: #00ff41 !important;
            -webkit-text-fill-color: #00ff41 !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: inherit;
            caret-color: #00ff41;
            line-height: 1.5;
            padding: 0;
            margin: 0;
            white-space: pre;
            -webkit-appearance: none;
            appearance: none;
        }

        #cmd::placeholder {
            color: #333;
            -webkit-text-fill-color: #333;
        }

        /* Suggestion ghost text */
        #suggestion {
            color: #444;
            pointer-events: none;

        /* Colors for ls output */

        .c-file { color: #c8c8c8; }

            'resume.pdf': { type: 'file', url: 'Resume_2023.pdf', content:
`[Binary file — resume.pdf]
Use "open resume.pdf" to view in browser.` },


            'animation.sh': { type: 'file', executable: true, content:
`#!/bin/bash

exec animation_engine --mode=dust-person --orb --interactive` },

            '.bashrc': { type: 'file', content:
`# enan portfolio shell config
export PS1="\\u@portfolio:\\w$ "
alias ll="ls -la"
alias la="ls -a"` },
        }
    };

    // ═══════════════════════════════════════════════════════════════
    // SHELL STATE
    // ═══════════════════════════════════════════════════════════════
    let cwd = ['~'];
    const history = [];
    let histIdx = -1;
    let savedInput = '';
    let appPhase = 'boot'; // boot | animation | shell

    const output = document.getElementById('output');
    const outputLines = document.getElementById('output-lines');
    const inputRow = document.getElementById('input-row');
    const cmdInput = document.getElementById('cmd');
    const suggestion = document.getElementById('suggestion');

    // ═══════════════════════════════════════════════════════════════
    // TERMINAL OUTPUT HELPERS
    // ═══════════════════════════════════════════════════════════════
    function print(html, cls = '') {
        const div = document.createElement('div');
        div.className = 'line' + (cls ? ' ' + cls : '');
        div.innerHTML = html;
        outputLines.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function printText(text) {
        print(escHtml(text));
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function typeLine(text, charDelay = 25, lineClass = '') {
        const div = document.createElement('div');
        div.className = 'line' + (lineClass ? ' ' + lineClass : '');
        outputLines.appendChild(div);
        for (let i = 0; i < text.length; i++) {
            div.textContent += text[i];
            output.scrollTop = output.scrollHeight;
            if (appPhase === 'skip') return;
            await delay(charDelay);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // FILESYSTEM HELPERS
    // ═══════════════════════════════════════════════════════════════
    function getNode(pathParts) {
        let node = fs;
        for (const p of pathParts) {
            if (p === '~') { node = fs; continue; }
            if (!node.children || !node.children[p]) return null;
            node = node.children[p];
        }
        return node;
    }

    function resolvePath(input) {
        let parts;
        if (input.startsWith('~/')) {
            parts = ['~', ...input.slice(2).split('/').filter(Boolean)];
        } else if (input === '~') {
            parts = ['~'];
        } else {
            parts = [...cwd, ...input.split('/').filter(Boolean)];
        }
        // Resolve . and ..
        const resolved = [];
        for (const p of parts) {
            if (p === '.') continue;
            if (p === '..') { if (resolved.length > 1) resolved.pop(); }
            else resolved.push(p);
        }
        if (resolved.length === 0) resolved.push('~');
        return resolved;
    }

    function cwdString() {
        if (cwd.length === 1) return '~';
        return '~/' + cwd.slice(1).join('/');
    }

    // Zsh two-line prompt: top line shows user@host path (git), bottom is ❯
    function promptTopHtml() {
        return `<span class="c-dim">╭─</span> <span class="c-bold"><span class="user">guest</span>@<span class="host">portfolio</span></span> <span class="path">${escHtml(cwdString())}</span> <span class="git">(main)</span>`;
    }

    function promptBottomHtml() {
        return `<span class="c-dim">╰─</span><span class="arrow">❯</span> `;
    }

    function updatePrompt() {
        // Remove old prompt-top if exists
        const existing = document.getElementById('prompt-top-live');
        if (existing) existing.remove();
        // Add top line at end of output-lines (just above input row visually)
        const topDiv = document.createElement('div');
        topDiv.className = 'line prompt-top';
        topDiv.id = 'prompt-top-live';
        topDiv.innerHTML = promptTopHtml();
        outputLines.appendChild(topDiv);
        // Update bottom prompt
        const promptEl = inputRow.querySelector('.prompt');
        promptEl.innerHTML = promptBottomHtml();
        output.scrollTop = output.scrollHeight;
    }

    // Tmux clock
    function updateTmuxClock() {
        const el = document.getElementById('tmux-clock');
        if (el) {
            const now = new Date();
            el.textContent = now.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit' }) + ' ' + now.toLocaleDateString('en-US', { month:'short', day:'numeric' });
        }
    }
    setInterval(updateTmuxClock, 10000);
    updateTmuxClock();

    function getCurrentDir() {
        return getNode(cwd);
    }

    // ═══════════════════════════════════════════════════════════════
    // COMMANDS
    // ═══════════════════════════════════════════════════════════════
    const commands = {};

    commands.help = () => {
        print(`<span class="c-bold c-cyan">Available commands:</span>`);
        print('');
        const cmds = [
            ['ls [path]',        'List directory contents'],
            ['cd <path>',        'Change directory'],
            ['cat <file>',       'Display file contents'],
            ['pwd',              'Print working directory'],
            ['whoami',           'Display current user'],
            ['ssh <target>',     'Open link (github, linkedin, contact)'],
            ['open <file>',      'Open file in browser (e.g. resume.pdf)'],
            ['clear',            'Clear terminal screen'],
            ['history',          'Show command history'],
            ['echo <text>',      'Print text'],
            ['date',             'Show current date'],
            ['uname -a',         'System information'],
            ['neofetch',         'Display system info with ASCII art'],
            ['sh animation.sh',  'Replay the particle animation'],
            ['! [text]',         'Cowsay (moo!)'],
            ['? [text]',         'Lolcat (rainbow text)'],
            ['top / who / w',    'Show active visitors (live)'],
            ['webcam',           'Test your webcam/camera'],
            ['man [cmd]',        'Contact info / manual'],
            ['exit',             'Logout'],
            ['help',             'Show this help message'],
        ];
        for (const [cmd, desc] of cmds) {
            print(`  <span class="c-green">${escHtml(cmd.padEnd(22))}</span><span class="c-dim">${escHtml(desc)}</span>`);
        }
        print('');
        print(`<span class="c-dim">Tab: autocomplete  |  Up/Down: history  |  Ctrl+L: clear</span>`);
    };

    commands.ls = (args) => {
        const showAll = args.includes('-a') || args.includes('-la') || args.includes('-al');
        const longFmt = args.includes('-l') || args.includes('-la') || args.includes('-al');
        const target = args.filter(a => !a.startsWith('-'))[0];
        const path = target ? resolvePath(target) : cwd;
        const node = getNode(path);

        if (!node) return print(`<span class="c-err">ls: cannot access '${escHtml(target)}': No such file or directory</span>`);
        if (node.type === 'file') return print(escHtml(target || path[path.length-1]));

        const entries = Object.keys(node.children);
        if (entries.length === 0) return;

        const items = showAll ? entries : entries.filter(e => !e.startsWith('.'));
        if (showAll) items.unshift('.', '..');

        if (longFmt) {
            print(`<span class="c-dim">total ${items.length}</span>`);
            for (const name of items) {
                if (name === '.' || name === '..') {
                    print(`drwxr-xr-x  <span class="c-dir">${escHtml(name)}</span>`);
                    continue;
                }
                const child = node.children[name];
                if (child.type === 'dir') {
                    print(`drwxr-xr-x  <span class="c-dir">${escHtml(name)}/</span>`);
                } else if (child.executable) {
                    print(`-rwxr-xr-x  <span class="c-exec">${escHtml(name)}</span>`);
                } else {
                    print(`-rw-r--r--  <span class="c-file">${escHtml(name)}</span>`);
                }
            }
        } else {
            const parts = items.map(name => {
                if (name === '.' || name === '..') return `<span class="c-dir">${name}</span>`;
                const child = node.children[name];
                if (child.type === 'dir') return `<span class="c-dir">${escHtml(name)}/</span>`;
                if (child.executable) return `<span class="c-exec">${escHtml(name)}</span>`;
                return `<span class="c-file">${escHtml(name)}</span>`;
            });
            print(parts.join('  '));
        }
    };

    commands.cd = (args) => {
        const target = args[0] || '~';
        const path = resolvePath(target);
        const node = getNode(path);
        if (!node) return print(`<span class="c-err">cd: no such file or directory: ${escHtml(target)}</span>`);
        if (node.type !== 'dir') return print(`<span class="c-err">cd: not a directory: ${escHtml(target)}</span>`);
        cwd = path;
        updatePrompt();
    };

    commands.cat = (args) => {
        if (!args[0]) return print(`<span class="c-err">cat: missing file operand</span>`);
        const path = resolvePath(args[0]);
        const node = getNode(path);
        if (!node) return print(`<span class="c-err">cat: ${escHtml(args[0])}: No such file or directory</span>`);
        if (node.type === 'dir') return print(`<span class="c-err">cat: ${escHtml(args[0])}: Is a directory</span>`);
        printText(node.content);
    };

    commands.pwd = () => printText(cwdString());
    commands.whoami = () => printText('guest');
    commands.date = () => printText(new Date().toString());

    commands.echo = (args) => printText(args.join(' '));

    commands.clear = () => {
        outputLines.innerHTML = '';
    };

    commands.history = () => {
        history.forEach((cmd, i) => {
            print(`  <span class="c-dim">${String(i + 1).padStart(4)}</span>  ${escHtml(cmd)}`);
        });
    };

    // Pipe-aware output capture
    let pipeCapture = null; // when non-null, print() appends here instead of DOM

    const _origPrint = print;
    print = function(html, cls) {
        if (pipeCapture !== null) {
            // Strip HTML tags for piped text
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            pipeCapture.push(tmp.textContent || '');
        } else {
            _origPrint(html, cls);
        }
    };

    async function execute(input) {
        const trimmed = input.trim();
        if (!trimmed) return;

        history.push(trimmed);
        histIdx = -1;

        // Handle pipes
        if (trimmed.includes('|')) {
            const segments = trimmed.split('|').map(s => s.trim()).filter(Boolean);
            let pipedInput = null;

            for (let si = 0; si < segments.length; si++) {
                const isLast = si === segments.length - 1;
                const seg = segments[si];
                const parts = seg.split(/\s+/);
                let cmd = parts[0];
                let args = parts.slice(1);

                // If there's piped input from previous command, add it as arg
                if (pipedInput !== null && args.length === 0) {
                    args = [pipedInput.join('\n')];
                }

                if (!isLast) {
                    // Capture output
                    pipeCapture = [];
                    if (commands[cmd]) {
                        await commands[cmd](args);
                    } else {
                        pipeCapture.push(`command not found: ${cmd}`);
                    }
                    pipedInput = pipeCapture;
                    pipeCapture = null;
                } else {
                    // Last command — output normally
                    if (pipedInput !== null && cmd === 'lolcat' || cmd === '?') {
                        // Special: pipe into lolcat
                        lolcat(pipedInput.join('\n'));
                    } else if (commands[cmd]) {
                        if (pipedInput !== null && (cmd === 'echo' || cmd === 'lolcat' || cmd === '?')) {
                            args = [pipedInput.join('\n')];
                        }
                        await commands[cmd](args);
                    } else {
                        print(`<span class="c-err">command not found: ${escHtml(cmd)}</span>`);
                    }
                }
            }
            return;
        }

        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        const args = parts.slice(1);

        if (commands[cmd]) {
            await commands[cmd](args);
        } else {
            print(`<span class="c-err">command not found: ${escHtml(cmd)}</span>`);
            print(`<span class="c-dim">Type "help" for available commands.</span>`);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // TAB COMPLETION
    // ═══════════════════════════════════════════════════════════════
    function getCompletions(input) {
        const parts = input.split(/\s+/);
        const allCmds = [...Object.keys(commands), 'sh'];

        if (parts.length <= 1) {
            // Complete command names
            const prefix = parts[0] || '';
            return { type: 'cmd', matches: allCmds.filter(c => c.startsWith(prefix) && c !== prefix), prefix };
        }

        // Complete file/dir names
        const partial = parts[parts.length - 1] || '';
        let dirParts, namePrefix;

        if (partial.includes('/')) {
            const lastSlash = partial.lastIndexOf('/');
            const dirPath = partial.slice(0, lastSlash) || '.';
            namePrefix = partial.slice(lastSlash + 1);
            dirParts = resolvePath(dirPath);
        } else {
            dirParts = cwd;
            namePrefix = partial;
        }

        const dirNode = getNode(dirParts);
        if (!dirNode || dirNode.type !== 'dir') return { type: 'file', matches: [], prefix: namePrefix };

        const matches = Object.keys(dirNode.children)
            .filter(n => n.startsWith(namePrefix) && n !== namePrefix)
            .map(n => {
                const child = dirNode.children[n];
                return child.type === 'dir' ? n + '/' : n;
            });

        return { type: 'file', matches, prefix: namePrefix };
    }

    function doTabComplete() {
        const input = cmdInput.value;
        const comp = getCompletions(input);

        if (comp.matches.length === 0) return;

        if (comp.matches.length === 1) {
            const match = comp.matches[0];
            if (comp.type === 'cmd') {
                cmdInput.value = match + ' ';
            } else {
                const beforePrefix = input.slice(0, input.length - comp.prefix.length);
                cmdInput.value = beforePrefix + match;
                if (!match.endsWith('/')) cmdInput.value += ' ';
            }
        } else {
            // Show options
            const promptHtml = inputRow.querySelector('.prompt').innerHTML;
            print(`<span class="prompt">${promptHtml}</span>${escHtml(input)}`);
            print(comp.matches.map(m => {
                if (m.endsWith('/')) return `<span class="c-dir">${escHtml(m)}</span>`;
                return escHtml(m);
            }).join('  '));
            // Find common prefix
            let common = comp.matches[0];
            for (const m of comp.matches) {
                while (!m.startsWith(common)) common = common.slice(0, -1);
            }
            if (common.length > comp.prefix.length) {
                const beforePrefix = input.slice(0, input.length - comp.prefix.length);
                cmdInput.value = beforePrefix + common;
            }
        }
        updateSuggestion();
    }

    // ═══════════════════════════════════════════════════════════════
    // INLINE SUGGESTION (grey ghost text)
    // ═══════════════════════════════════════════════════════════════
    function updateSuggestion() {
        const val = cmdInput.value;
        if (!val) { suggestion.textContent = ''; return; }
        // Find most recent history match
        for (let i = history.length - 1; i >= 0; i--) {
            if (history[i].startsWith(val) && history[i] !== val) {
                suggestion.textContent = history[i].slice(val.length);
                return;
            }
        }
        suggestion.textContent = '';
    }

    cmdInput.addEventListener('keydown', async (e) => {
        if (appPhase !== 'shell') return;

        if (e.key === 'Tab') {
            e.preventDefault();
            doTabComplete();
            return;

        if (e.key === 'Enter') {
            e.preventDefault();
            const val = cmdInput.value;
            // Remove live prompt-top and print both lines to output
            const liveTop = document.getElementById('prompt-top-live');
            if (liveTop) liveTop.remove();
            print(promptTopHtml(), 'prompt-top');

            cmdInput.value = '';

            inputRow.classList.add('hidden');
            await execute(val);
            if (appPhase === 'shell') {
                inputRow.classList.remove('hidden');
                updatePrompt();
                cmdInput.focus();
                output.scrollTop = output.scrollHeight;
            }
            return;
        }

        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length === 0) return;
            if (histIdx === -1) savedInput = cmdInput.value;
            histIdx = Math.min(histIdx + 1, history.length - 1);
            cmdInput.value = history[history.length - 1 - histIdx];
            updateSuggestion();
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (histIdx <= 0) {
                histIdx = -1;
                cmdInput.value = savedInput;
            } else {
                histIdx--;
                cmdInput.value = history[history.length - 1 - histIdx];
            }
            updateSuggestion();
            return;
        }

        // Accept suggestion with Right arrow at end of input
        if (e.key === 'ArrowRight' && suggestion.textContent &&
            cmdInput.selectionStart === cmdInput.value.length) {
            e.preventDefault();
            cmdInput.value += suggestion.textContent;
            suggestion.textContent = '';
            return;
        }

        // Ctrl+L = clear
        if (e.ctrlKey && e.key === 'l') {
            e.preventDefault();
            commands.clear();
            return;
        }

        // Ctrl+C = cancel current input
        if (e.ctrlKey && e.key === 'c') {
            e.preventDefault();
            const liveTop = document.getElementById('prompt-top-live');
            if (liveTop) liveTop.remove();
            print(promptTopHtml(), 'prompt-top');
            const promptHtml = inputRow.querySelector('.prompt').innerHTML;
            print(`<span class="prompt">${promptHtml}</span>${escHtml(cmdInput.value)}^C`);
            cmdInput.value = '';
            suggestion.textContent = '';
            updatePrompt();
            return;
        }
    });

    function handleViewportResize() {
        if (window.visualViewport) {
            const vv = window.visualViewport;
            terminalEl.style.height = vv.height + 'px';
            // Offset if viewport scrolled (iOS shifts page up)
            terminalEl.style.transform = `translateY(${vv.offsetTop}px)`;
            output.scrollTop = output.scrollHeight;
        }
    }
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleViewportResize);
        window.visualViewport.addEventListener('scroll', handleViewportResize);

    // ═══════════════════════════════════════════════════════════════
    // PRETEXT PARTICLE ANIMATION (canvas overlay)
    // ═══════════════════════════════════════════════════════════════
    import { prepareWithSegments, layoutWithLines } from 'https://esm.sh/@chenglou/pretext@0.0.3';

    const animCanvas = document.getElementById('animCanvas');
    const animCtx = animCanvas.getContext('2d');
    const skipHint = document.getElementById('skipHint');
    const palette = ['#ff007f','#ff00ff','#00ff00','#00ffff','#ffff00','#ff8800','#00a2ff'];

    let animRunning = false;
    let animCancelled = false;
    let animFrameId = null;

    // ── Person silhouette mask ──
    function generatePersonMask() {
        const off = document.createElement('canvas');
        const w = 300, h = 500;
        off.width = w; off.height = h;
        const c = off.getContext('2d');
        c.fillStyle = '#fff'; c.strokeStyle = '#fff';
        c.lineCap = 'round'; c.lineJoin = 'round';

        // Hair
        c.beginPath();
        c.moveTo(118,18); c.quadraticCurveTo(130,5,155,10);
        c.quadraticCurveTo(175,8,182,18); c.quadraticCurveTo(188,10,185,25);
        c.quadraticCurveTo(190,20,188,35); c.lineTo(185,42); c.lineTo(115,42);
        c.quadraticCurveTo(110,25,112,18); c.quadraticCurveTo(115,10,118,18);
        c.closePath(); c.fill();
        // Head
        c.beginPath(); c.ellipse(150,58,32,38,0,0,Math.PI*2); c.fill();
        // Ears
        c.beginPath(); c.ellipse(116,58,6,10,-0.15,0,Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(184,58,6,10,0.15,0,Math.PI*2); c.fill();
        // Neck
        c.beginPath(); c.moveTo(138,90); c.lineTo(162,90); c.lineTo(160,112); c.lineTo(140,112); c.closePath(); c.fill();
        // Shoulders
        c.beginPath(); c.moveTo(140,112); c.quadraticCurveTo(150,108,160,112);
        c.lineTo(210,130); c.lineTo(205,140); c.lineTo(95,140); c.lineTo(90,130); c.closePath(); c.fill();
        // Torso
        c.beginPath(); c.moveTo(95,140); c.quadraticCurveTo(88,180,92,220);
        c.quadraticCurveTo(90,250,95,280); c.lineTo(205,280);
        c.quadraticCurveTo(210,250,208,220); c.quadraticCurveTo(212,180,205,140); c.closePath(); c.fill();
        c.fillRect(93,272,114,12);
        // Left arm
        c.lineWidth=18; c.beginPath(); c.moveTo(90,135); c.quadraticCurveTo(60,175,55,220); c.quadraticCurveTo(50,260,58,295); c.stroke();
        c.lineWidth=16; c.beginPath(); c.moveTo(58,295); c.quadraticCurveTo(55,320,60,340); c.stroke();
        c.beginPath(); c.arc(60,345,10,0,Math.PI*2); c.fill();
        c.lineWidth=5;
        c.beginPath(); c.moveTo(52,345); c.lineTo(48,358); c.stroke();
        c.beginPath(); c.moveTo(60,348); c.lineTo(58,362); c.stroke();
        c.beginPath(); c.moveTo(68,345); c.lineTo(70,358); c.stroke();
        // Right arm (holding orb)
        c.lineWidth=18; c.beginPath(); c.moveTo(210,135); c.quadraticCurveTo(240,155,255,180); c.stroke();
        c.lineWidth=16; c.beginPath(); c.moveTo(255,180); c.quadraticCurveTo(270,200,278,215); c.stroke();
        c.beginPath(); c.arc(280,220,12,0,Math.PI*2); c.fill();
        c.lineWidth=5;
        c.beginPath(); c.moveTo(272,228); c.quadraticCurveTo(268,240,275,245); c.stroke();
        c.beginPath(); c.moveTo(280,230); c.quadraticCurveTo(280,242,282,248); c.stroke();
        c.beginPath(); c.moveTo(288,228); c.quadraticCurveTo(292,240,288,245); c.stroke();
        // Left leg
        c.lineWidth=22; c.beginPath(); c.moveTo(120,280); c.quadraticCurveTo(112,340,108,400); c.quadraticCurveTo(105,430,102,460); c.stroke();
        c.lineWidth=12; c.beginPath(); c.moveTo(102,460); c.quadraticCurveTo(85,468,78,470); c.stroke();
        c.beginPath(); c.ellipse(85,472,18,7,0,0,Math.PI*2); c.fill();
        // Right leg
        c.lineWidth=22; c.beginPath(); c.moveTo(180,280); c.quadraticCurveTo(185,340,188,400); c.quadraticCurveTo(190,430,192,460); c.stroke();
        c.lineWidth=12; c.beginPath(); c.moveTo(192,460); c.quadraticCurveTo(210,468,218,470); c.stroke();
        c.beginPath(); c.ellipse(208,472,18,7,0,0,Math.PI*2); c.fill();

        return { w, h, data: c.getImageData(0,0,w,h).data };
    }

    const personMask = generatePersonMask();
    function isInsidePerson(px,py) {
        if (px<0||py<0||px>=personMask.w||py>=personMask.h) return false;
        return personMask.data[(Math.floor(py)*personMask.w+Math.floor(px))*4+3]>128;
    }

    async function runAnimation() {
        if (animRunning) return;
        animRunning = true;
        animCancelled = false;

        const prevPhase = appPhase;
        appPhase = 'animation';
        inputRow.classList.add('hidden');

        print('<span class="c-info">$ sh animation.sh</span>');
        print('<span class="c-dim">Running particle animation...</span>');

        const AW = animCanvas.width = window.innerWidth;
        const AH = animCanvas.height = window.innerHeight;
        animCanvas.classList.add('active');

        const ANIM_FONT = '8px JetBrains Mono';
        const GLYPH_CHARS = ['.','·','+','·','.','·','.','·','.','.'];
        const isMob = AW <= 768;
        const pScale = isMob ? 0.7 : 1.2;

        // Layout
        const personDrawW = personMask.w * pScale;
        const pOriginX = (AW - personDrawW) / 2 - 40;
        const pOriginY = AH * (isMob ? 0.25 : 0.18);
        const orbCX = pOriginX + 280 * pScale;
        const orbCY = pOriginY + 220 * pScale;
        const orbR = isMob ? 85 : 150;

        // Build glyph grid via Pretext
        const cols = Math.floor(AW / 7);
        const rows = Math.floor(AH / 9);
        let str = '';
        for (let i = 0; i < cols * rows; i++) {
            str += GLYPH_CHARS[Math.floor(Math.random() * GLYPH_CHARS.length)];
            if ((i + 1) % cols === 0) str += '\n';
        }
        const prepared = prepareWithSegments(str, ANIM_FONT, { whiteSpace: 'pre-wrap' });
        const result = layoutWithLines(prepared, AW, 9);

        // Create particles
        const parts = [];
        for (let li = 0; li < result.lines.length; li++) {
            const lineText = result.lines[li].text;
            const baseY = li * 9 + 4;
            for (let ci = 0; ci < lineText.length; ci++) {
                const ch = lineText[ci];
                if (ch === '\n') continue;
                const homeX = ci * 7 + 3;
                const homeY = baseY;
                const relX = (homeX - pOriginX) / pScale;
                const relY = (homeY - pOriginY) / pScale;

                let role = 'ambient';
                let baseOp = 0.12 + Math.random() * 0.12;
                const dx = homeX - orbCX, dy = homeY - orbCY;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (isInsidePerson(relX, relY)) {
                    role = 'person';
                    baseOp = 0.6 + Math.random() * 0.4;
                } else if (dist < orbR) {
                    role = 'orb';
                    baseOp = 0.7 + Math.random() * 0.3;
                }

                parts.push({
                    ch, homeX, homeY, role,
                    x: -200 - Math.random() * 800,
                    y: Math.random() * AH,
                    targetX: homeX, targetY: homeY,
                    opacity: 0, baseOp,
                    turbPhase: Math.random() * Math.PI * 2,
                    turbSpeed: 0.01 + Math.random() * 0.03,
                    delay: Math.random() * 1.0,
                    seed: Math.random(),
                    colorVal: 210 + Math.floor(Math.random() * 45),
                    ambVal: 100 + Math.floor(Math.random() * 60),
                    orbAngle: Math.atan2(dy, dx),
                    orbDist: dist,
                    orbSpeed: 0.003 + Math.random() * 0.008,
                    color: null,
                });
            }
        }

        // Snow
        const snow = [];
        const snowCount = isMob ? 200 : 500;
        for (let i = 0; i < snowCount; i++) {
            snow.push({
                x: Math.random() * AW, y: -Math.random() * 40 - 5,
                speed: 0.1 + Math.random() * 0.3,
                size: Math.random() > 0.7 ? 1.5 : 1,
                color: `rgba(${150 + Math.floor(Math.random()*100)},${150 + Math.floor(Math.random()*100)},${150 + Math.floor(Math.random()*100)},${0.2 + Math.random()*0.4})`,
            });
        }

        // Ctrl+C handler
        function onCtrlC(e) {
            if (e.ctrlKey && e.key === 'c') { animCancelled = true; e.preventDefault(); }
        }
        document.addEventListener('keydown', onCtrlC);

        // Mouse/touch tracking for interactive orb
        let animMouseX = AW / 2, animMouseY = AH / 2;
        let animHoveredSec = -1;

        function onAnimMouseMove(e) { animMouseX = e.clientX; animMouseY = e.clientY; }
        function onAnimTouchMove(e) { e.preventDefault(); animMouseX = e.touches[0].clientX; animMouseY = e.touches[0].clientY; }
        function onAnimTouchStart(e) { animMouseX = e.touches[0].clientX; animMouseY = e.touches[0].clientY; }
        const sectionUrls = {
            4: 'mailto:contact@enan.dev',
            5: 'https://github.com/Enan456',
            6: 'https://www.linkedin.com/in/enan-srivastava/',
        };

        let exitFlashAlpha = 0; // light blue flash on exit click

        function onAnimClick(e) {
            if (phase < 2) return;
            const sec = getAnimOrbSection(e.clientX || animMouseX, e.clientY || animMouseY);
            if (sectionUrls[sec]) {
                window.open(sectionUrls[sec], '_blank');
                return; // don't exit, just open link
            }
            // Click anywhere else = exit with blue flash
            exitFlashAlpha = 1.0;
            setTimeout(() => { animCancelled = true; }, 400);
        }
        function onAnimMouseMoveWithCursor(e) {
            animMouseX = e.clientX; animMouseY = e.clientY;
            if (phase >= 2) {
                const sec = getAnimOrbSection(animMouseX, animMouseY);
                animCanvas.style.cursor = sectionUrls[sec] ? 'pointer' : 'default';
            }
        }

        animCanvas.addEventListener('mousemove', onAnimMouseMoveWithCursor);
        animCanvas.addEventListener('touchmove', onAnimTouchMove, { passive: false });
        animCanvas.addEventListener('touchstart', onAnimTouchStart, { passive: true });
        animCanvas.addEventListener('click', onAnimClick);

        function getAnimOrbSection(mx, my) {
            const dx = mx - orbCX, dy = my - orbCY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > orbR + 15) return -1;
            let ang = Math.atan2(dy, dx) + Math.PI/2 + (Math.PI*2/7)/2;
            if (ang >= Math.PI*2) ang -= Math.PI*2;
            if (ang < 0) ang += Math.PI*2;
            return Math.floor(ang / ((Math.PI*2)/7));
        }

        const sectionLabels = ['ABOUT','WORK','SKILLS','','CONTACT','GITHUB','LINKEDIN'];
        const sectionInfo = [
            'If you want to build cool stuff, hit me up.',
            'Operator | Data Scientist | COO A Cubed | Erdos Mentor',
            'Python, AWS, GCP, Java, JS, SQL | Design Thinking',
            '',
            '630-608-3688 | contact@enan.dev  [click to email]',
            'github.com/Enan456  [click to open]',
            'linkedin.com/in/enan-srivastava  [click to open]',
        ];

        // Animation loop
        let phase = 0, phaseTime = 0, orbTime = 0;
        const P0 = 3.5, P1 = 2.0;
        let lastT = performance.now();

        await new Promise(resolve => {
            function frame(now) {
                if (animCancelled) { resolve(); return; }

                const dt = (now - lastT) / 1000;
                lastT = now;
                phaseTime += dt;
                orbTime += dt;

                animCtx.clearRect(0, 0, AW, AH);

                // Phase transitions
                if (phase === 0 && phaseTime >= P0) { phase = 1; phaseTime = 0; }
                if (phase === 1 && phaseTime >= P1) { phase = 2; phaseTime = 0; }
                // Phase 2 runs forever — click or Ctrl+C exits

                // Update hovered section in phase 2
                if (phase === 2) {
                    animHoveredSec = getAnimOrbSection(animMouseX, animMouseY);
                }

                // Snow
                for (const s of snow) {
                    s.y += s.speed;
                    if (s.y > AH + 10) { s.y = -5; s.x = Math.random() * AW; }
                    animCtx.fillStyle = s.color;
                    animCtx.fillRect(s.x, s.y, s.size, s.size);
                }

                // Particles
                animCtx.font = ANIM_FONT;
                animCtx.textAlign = 'center';
                animCtx.textBaseline = 'middle';

                for (let i = 0; i < parts.length; i++) {
                    const p = parts[i];
                    p.turbPhase += p.turbSpeed;

                    if (phase === 0) {
                        const t = Math.max(0, Math.min(1, (phaseTime - p.delay) / (P0 - 1)));
                        const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
                        if (p.role === 'orb') {
                            p.x += (p.homeX - p.x) * ease * 0.06;
                            p.y += (p.homeY - p.y) * ease * 0.06;
                            p.opacity = p.baseOp * 0.1;
                        } else {
                            p.x += (p.targetX - p.x) * ease * 0.07;
                            p.y += (p.targetY - p.y) * ease * 0.07;
                            p.opacity = p.role === 'person' ? p.baseOp * ease : p.baseOp * ease * 0.5;
                        }
                        if (t < 0.85) {
                            const turb = (1-t)*4;
                            p.x += Math.sin(p.turbPhase)*turb;
                            p.y += Math.cos(p.turbPhase*0.7)*turb;
                        }
                    } else if (phase === 1) {
                        if (p.role === 'person') {
                            const breath = Math.sin(orbTime*1.5)*4;
                            const driftX = Math.sin(p.turbPhase*1.3+i*0.05)*3;
                            const driftY = Math.cos(p.turbPhase*0.9+i*0.07)*3+breath;
                            p.x += (p.targetX+driftX-p.x)*0.06;
                            p.y += (p.targetY+driftY-p.y)*0.06;
                            p.opacity = p.baseOp;
                        } else if (p.role === 'orb') {
                            const t = Math.min(1, phaseTime/P1);
                            p.opacity = p.baseOp * t;
                            p.orbAngle += p.orbSpeed;
                            const sa = p.orbAngle + orbTime*0.3;
                            const r = p.orbDist*(0.3+0.7*t);
                            p.x += (orbCX+Math.cos(sa)*r - p.x)*0.08;
                            p.y += (orbCY+Math.sin(sa)*r - p.y)*0.08;
                        } else {
                            p.x += (p.homeX-p.x)*0.05;
                            p.y += (p.homeY-p.y)*0.05;
                            p.opacity = p.baseOp;
                        }
                    } else {
                        // Phase 2: living idle + interactive
                        if (p.role === 'person') {
                            const breath = Math.sin(orbTime*1.2+i*0.003)*5;
                            const driftX = Math.sin(p.turbPhase*1.3+i*0.05)*4;
                            const driftY = Math.cos(p.turbPhase*0.9+i*0.07)*3.5+breath;
                            const swirl = Math.sin(orbTime*2.5+i*0.02)*2;
                            p.x += (p.targetX+driftX+swirl-p.x)*0.05;
                            p.y += (p.targetY+driftY-p.y)*0.05;
                            p.opacity = p.baseOp*(0.7+Math.sin(p.turbPhase*2.5+i*0.1)*0.2);
                        } else if (p.role === 'orb') {
                            p.orbAngle += p.orbSpeed;
                            const st = orbTime*0.3;
                            const ba = p.orbAngle+st;
                            const r = Math.min(orbR, p.orbDist*(1+Math.sin(st+p.orbAngle*3)*0.08));
                            p.x = orbCX+Math.cos(ba)*r;
                            p.y = orbCY+Math.sin(ba)*r;
                            // Section color
                            let ang = Math.atan2(p.y-orbCY, p.x-orbCX)+Math.PI/2+(Math.PI*2/7)/2;
                            ang += Math.sin(Math.sqrt((p.x-orbCX)**2+(p.y-orbCY)**2)*0.04+orbTime*2)*0.2;
                            if (ang>=Math.PI*2) ang-=Math.PI*2;
                            if (ang<0) ang+=Math.PI*2;
                            const sec = Math.floor(ang/((Math.PI*2)/7));

                            // Highlight hovered section
                            if (animHoveredSec >= 0) {
                                if (sec === animHoveredSec) {
                                    p.color = palette[sec];
                                    p.opacity = Math.min(1, p.baseOp * 1.8);
                                } else {
                                    p.color = p.seed < 0.25 ? null : palette[sec];
                                    p.opacity = p.baseOp * 0.35;
                                }
                            } else {
                                p.color = p.seed < 0.25 ? null : palette[sec];
                                p.opacity = p.baseOp;
                            }

                            // Mouse pushes orb particles
                            const dxM = p.x - animMouseX, dyM = p.y - animMouseY;
                            const distM = Math.sqrt(dxM*dxM + dyM*dyM);
                            if (distM < 50) {
                                const push = (50-distM)/50*3;
                                p.x += (dxM/distM)*push;
                                p.y += (dyM/distM)*push;
                            }
                        } else {
                            p.x += (p.homeX-p.x)*0.02;
                            p.y += (p.homeY-p.y)*0.02;
                            p.x += Math.sin(p.turbPhase)*0.3;
                            p.y += Math.cos(p.turbPhase*0.6)*0.2;
                        }
                    }

                    if (p.opacity < 0.01) continue;

                    if (p.role === 'orb' && phase >= 1 && p.color) {
                        animCtx.fillStyle = hexToRgba(p.color, p.opacity);
                    } else if (p.role === 'person') {
                        animCtx.fillStyle = `rgba(${p.colorVal},${p.colorVal},${p.colorVal},${p.opacity})`;
                    } else if (p.role === 'orb' && phase >= 1) {
                        const g = 120 + p.seed * 80;
                        animCtx.fillStyle = `rgba(${g|0},${g|0},${g|0},${p.opacity * 0.7})`;
                    } else {
                        animCtx.fillStyle = `rgba(${p.ambVal},${p.ambVal},${p.ambVal},${p.opacity})`;
                    }
                    animCtx.fillText(p.ch, p.x, p.y);
                }

                // Title + interactive UI in phase 2
                if (phase === 2) {
                    const alpha = Math.min(1, phaseTime / 1.5);
                    animCtx.save();

                    // Title
                    animCtx.font = `bold ${isMob ? 28 : 48}px Orbitron, JetBrains Mono`;
                    animCtx.textAlign = 'center';
                    animCtx.fillStyle = `rgba(255,255,255,${alpha})`;
                    animCtx.fillText('ENAN', AW/2, AH * 0.06 + 20);
                    animCtx.font = `${isMob ? 11 : 14}px JetBrains Mono`;
                    animCtx.fillStyle = `rgba(200,200,200,${alpha * 0.8})`;
                    animCtx.fillText('OPERATOR  /  DATA SCIENTIST', AW/2, AH * 0.06 + (isMob ? 48 : 65));

                    // Nav labels around the orb
                    animCtx.font = `${isMob ? 9 : 12}px JetBrains Mono`;
                    for (let s = 0; s < 7; s++) {
                        if (!sectionLabels[s]) continue;
                        const secAngle = (s * (Math.PI*2/7)) - Math.PI/2 - (Math.PI*2/7)/2;
                        const labelR = orbR + (isMob ? 20 : 30);
                        const lx = orbCX + Math.cos(secAngle) * labelR;
                        const ly = orbCY + Math.sin(secAngle) * labelR;
                        const isHovered = s === animHoveredSec;
                        animCtx.fillStyle = isHovered ? palette[s] : `rgba(150,150,150,${alpha * 0.5})`;
                        if (isHovered) {
                            animCtx.font = `bold ${isMob ? 10 : 13}px JetBrains Mono`;
                        }
                        animCtx.fillText(sectionLabels[s], lx, ly);
                        if (isHovered) {
                            animCtx.font = `${isMob ? 9 : 12}px JetBrains Mono`;
                        }
                    }

                    // Hovered section info at bottom
                    if (animHoveredSec >= 0 && sectionInfo[animHoveredSec]) {
                        animCtx.font = `${isMob ? 11 : 14}px JetBrains Mono`;
                        animCtx.fillStyle = palette[animHoveredSec];
                        animCtx.fillText(sectionLabels[animHoveredSec], AW/2, AH - (isMob ? 65 : 80));
                        animCtx.font = `${isMob ? 10 : 12}px JetBrains Mono`;
                        animCtx.fillStyle = `rgba(200,200,200,0.8)`;
                        animCtx.fillText(sectionInfo[animHoveredSec], AW/2, AH - (isMob ? 45 : 55));
                    }

                    // Cursor glow on orb
                    if (animHoveredSec >= 0) {
                        animCtx.beginPath();
                        animCtx.arc(animMouseX, animMouseY, 6, 0, Math.PI*2);
                        animCtx.strokeStyle = palette[animHoveredSec] + '50';
                        animCtx.lineWidth = 1;
                        animCtx.stroke();
                    }

                    // Skip hint
                    animCtx.font = `${isMob ? 10 : 11}px JetBrains Mono`;
                    animCtx.fillStyle = `rgba(80,80,80,${alpha * 0.6})`;
                    animCtx.fillText('Click or Ctrl+C to exit', AW/2, AH - 15);

                    animCtx.restore();
                }

                // Light blue exit flash overlay
                if (exitFlashAlpha > 0) {
                    animCtx.fillStyle = `rgba(100, 180, 255, ${exitFlashAlpha * 0.3})`;
                    animCtx.fillRect(0, 0, AW, AH);
                    exitFlashAlpha = Math.max(0, exitFlashAlpha - dt * 2.5);
                }

                animFrameId = requestAnimationFrame(frame);
            }
            animFrameId = requestAnimationFrame(frame);
        });

        // Cleanup
        document.removeEventListener('keydown', onCtrlC);
        animCanvas.removeEventListener('mousemove', onAnimMouseMoveWithCursor);
        animCanvas.removeEventListener('touchmove', onAnimTouchMove);
        animCanvas.removeEventListener('touchstart', onAnimTouchStart);
        animCanvas.removeEventListener('click', onAnimClick);
        animCanvas.style.cursor = '';
        if (animFrameId) cancelAnimationFrame(animFrameId);

        // Fade out canvas
        animCanvas.classList.add('fading');
        await delay(800);
        animCanvas.classList.remove('active', 'fading');
        animCanvas.style.opacity = '';

        if (animCancelled) {
            print('^C');
        } else {
            print('<span class="c-dim">Animation complete.</span>');
        }
        print('');

        animRunning = false;
        appPhase = 'shell';
        inputRow.classList.remove('hidden');
        updatePrompt();
        cmdInput.focus();
        output.scrollTop = output.scrollHeight;
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ═══════════════════════════════════════════════════════════════
    // BOOT SEQUENCE
    // ═══════════════════════════════════════════════════════════════
    let skipBoot = false;

    function onSkipBoot() { skipBoot = true; }

    async function runBoot() {
        appPhase = 'boot';
        skipBoot = false;
        document.addEventListener('keydown', onSkipBoot, { once: false });
        document.addEventListener('click', onSkipBoot, { once: true });

        const fast = () => skipBoot;
        const d = (ms) => fast() ? delay(0) : delay(ms);

        await d(300);
        print('<span class="c-dim">[    0.000000] Linux version 6.18.5-portfolio (enan@build) (gcc 13.2.0)</span>');
        await d(100);
        print('<span class="c-dim">[    0.012345] Command line: BOOT_IMAGE=/vmlinuz root=/dev/sda1</span>');
        await d(80);
        print('<span class="c-dim">[    0.034521] x86/cpu: AMD EPYC 7R13 Processor</span>');
        await d(80);
        print('<span class="c-dim">[    0.056789] Memory: 16384MB available</span>');
        await d(150);
        print('<span class="c-green">[  OK  ]</span> Started systemd-journald.service');
        await d(100);
        print('<span class="c-green">[  OK  ]</span> Started systemd-networkd.service');
        await d(100);
        print('<span class="c-green">[  OK  ]</span> Reached target network-online.target');
        await d(100);
        print('<span class="c-green">[  OK  ]</span> Started openssh-server.service');
        await d(100);
        print('<span class="c-green">[  OK  ]</span> Started tmux server');
        await d(200);
        print('');

        // Login
        print('<span class="c-dim">EnanOS 3.2.1 LTS (GNU/Linux 6.18.5-portfolio x86_64)</span>');
        print('');
        await typeLine('enan-portfolio login: ', fast() ? 0 : 20);
        await d(500);
        const lastLine = outputLines.lastElementChild;
        if (lastLine) {
            for (const ch of 'guest') {
                lastLine.textContent += ch;
                if (!fast()) await delay(70);
            }
        }
        await d(200);

        await typeLine('Password: ', fast() ? 0 : 20);
        await d(300);
        const pwLine = outputLines.lastElementChild;
        if (pwLine) {
            for (let i = 0; i < 10; i++) {
                pwLine.textContent += '*';
                if (!fast()) await delay(50);
            }
        }
        await d(400);
        print('');

        const now = new Date();
        print(`<span class="c-dim">Last login: ${now.toDateString()} ${now.toLocaleTimeString()} from 192.168.1.42</span>`);
        print('');
        print(`Welcome to <span class="c-bold">EnanOS 3.2.1 LTS</span> <span class="c-dim">\\s \\r \\m</span>`);
        print('');
        print(`  <span class="c-dim">*</span> Docs:    <span class="c-cyan">https://enan.dev</span>`);
        print(`  <span class="c-dim">*</span> GitHub:  <span class="c-cyan">https://github.com/Enan456</span>`);
        print(`  <span class="c-dim">*</span> Shell:   <span class="c-dim">zsh 5.9 with oh-my-zsh</span>`);
        print('');
        print(`Type <span class="c-green">"help"</span> for commands  |  <span class="c-green">"!"</span> cowsay  |  <span class="c-green">"?"</span> lolcat`);
        print('');

        document.removeEventListener('keydown', onSkipBoot);

        // Run animation after login (skip if user pressed key during boot)
        if (!skipBoot) {
            await runAnimation();
        } else {
            // Skipped boot = skip animation too, go straight to shell
            appPhase = 'shell';
            inputRow.classList.remove('hidden');
            updatePrompt();
            cmdInput.focus();
            output.scrollTop = output.scrollHeight;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // START
    // ═══════════════════════════════════════════════════════════════
    runBoot();

    </script>
</body>
</html>
