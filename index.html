<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>enan@portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #c8c8c8;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(13px, 1.8vw, 15px);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: #333 #0a0a0a;
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: #0a0a0a; }
        #output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .line { min-height: 1.5em; }

        #input-row {
            display: flex;
            align-items: center;
            min-height: 1.5em;
            flex-shrink: 0;
        }

        #input-row.hidden { display: none; }

        .prompt { color: #5faf5f; white-space: nowrap; }
        .prompt .user { color: #5fafff; }
        .prompt .path { color: #af87ff; }

        #cmd {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #c8c8c8;
            font-family: inherit;
            font-size: inherit;
            caret-color: #5faf5f;
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }

        /* Suggestion ghost text */
        #suggestion {
            color: #444;
            pointer-events: none;
        }

        /* Colors for ls output */
        .c-dir { color: #5fafff; font-weight: bold; }
        .c-exec { color: #5faf5f; }
        .c-file { color: #c8c8c8; }
        .c-link { color: #af87ff; }
        .c-err { color: #ff5f5f; }
        .c-info { color: #5fafaf; }
        .c-warn { color: #d7af5f; }
        .c-green { color: #5faf5f; }
        .c-bold { font-weight: bold; }
        .c-dim { color: #555; }
        .c-cyan { color: #5fafaf; }
        .c-magenta { color: #af87ff; }

        /* Animation canvas overlay */
        #animCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
            background: #0a0a0a;
        }

        #animCanvas.active { display: block; }
        #animCanvas.fading { opacity: 0; transition: opacity 0.8s ease; }

        #skipHint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            color: #555;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            display: none;
        }

        #skipHint.active { display: block; }

        @media (max-width: 768px) {
            #terminal { padding: 8px; }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-row" class="hidden">
            <span class="prompt"><span class="user">enan</span>@portfolio:<span class="path">~</span>$ </span>
            <input id="cmd" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false">
            <span id="suggestion"></span>
        </div>
    </div>
    <canvas id="animCanvas"></canvas>
    <div id="skipHint">Press Ctrl+C to skip...</div>

    <script type="module">

`# enan portfolio shell config
export PS1="\\u@portfolio:\\w$ "

alias la="ls -a"` },

    };

    // ═══════════════════════════════════════════════════════════════
    // SHELL STATE
    // ═══════════════════════════════════════════════════════════════
    let cwd = ['~'];
    const history = [];
    let histIdx = -1;
    let savedInput = '';
    let appPhase = 'boot'; // boot | animation | shell

    const output = document.getElementById('output');
    const inputRow = document.getElementById('input-row');
    const cmdInput = document.getElementById('cmd');
    const suggestion = document.getElementById('suggestion');

    // ═══════════════════════════════════════════════════════════════
    // TERMINAL OUTPUT HELPERS
    // ═══════════════════════════════════════════════════════════════
    function print(html, cls = '') {
        const div = document.createElement('div');
        div.className = 'line' + (cls ? ' ' + cls : '');
        div.innerHTML = html;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function printText(text) {
        print(escHtml(text));
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function typeLine(text, charDelay = 25, lineClass = '') {
        const div = document.createElement('div');
        div.className = 'line' + (lineClass ? ' ' + lineClass : '');
        output.appendChild(div);
        for (let i = 0; i < text.length; i++) {
            div.textContent += text[i];
            output.scrollTop = output.scrollHeight;
            if (appPhase === 'skip') return;
            await delay(charDelay);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // FILESYSTEM HELPERS
    // ═══════════════════════════════════════════════════════════════
    function getNode(pathParts) {
        let node = fs;
        for (const p of pathParts) {
            if (p === '~') { node = fs; continue; }
            if (!node.children || !node.children[p]) return null;
            node = node.children[p];
        }
        return node;
    }

    function resolvePath(input) {
        let parts;
        if (input.startsWith('~/')) {
            parts = ['~', ...input.slice(2).split('/').filter(Boolean)];
        } else if (input === '~') {
            parts = ['~'];
        } else {
            parts = [...cwd, ...input.split('/').filter(Boolean)];
        }
        // Resolve . and ..
        const resolved = [];
        for (const p of parts) {
            if (p === '.') continue;
            if (p === '..') { if (resolved.length > 1) resolved.pop(); }
            else resolved.push(p);
        }
        if (resolved.length === 0) resolved.push('~');
        return resolved;
    }

    function cwdString() {
        if (cwd.length === 1) return '~';
        return '~/' + cwd.slice(1).join('/');
    }

    function updatePrompt() {
        const promptEl = inputRow.querySelector('.prompt');
        promptEl.innerHTML = `<span class="user">enan</span>@portfolio:<span class="path">${escHtml(cwdString())}</span>$ `;
    }

    function getCurrentDir() {
        return getNode(cwd);
    }

    // ═══════════════════════════════════════════════════════════════
    // COMMANDS
    // ═══════════════════════════════════════════════════════════════
    const commands = {};

    commands.help = () => {
        print(`<span class="c-bold c-cyan">Available commands:</span>`);
        print('');
        const cmds = [
            ['ls [path]',        'List directory contents'],
            ['cd <path>',        'Change directory'],
            ['cat <file>',       'Display file contents'],
            ['pwd',              'Print working directory'],
            ['whoami',           'Display current user'],
            ['ssh <target>',     'Open link (github, linkedin, contact)'],
            ['open <file>',      'Open file in browser (e.g. resume.pdf)'],
            ['clear',            'Clear terminal screen'],
            ['history',          'Show command history'],
            ['echo <text>',      'Print text'],
            ['date',             'Show current date'],
            ['uname -a',         'System information'],
            ['neofetch',         'Display system info with ASCII art'],
            ['sh animation.sh',  'Replay the particle animation'],
            ['exit',             'Logout'],
            ['help',             'Show this help message'],
        ];
        for (const [cmd, desc] of cmds) {
            print(`  <span class="c-green">${escHtml(cmd.padEnd(22))}</span><span class="c-dim">${escHtml(desc)}</span>`);
        }
        print('');
        print(`<span class="c-dim">Tab: autocomplete  |  Up/Down: history  |  Ctrl+L: clear</span>`);
    };

    commands.ls = (args) => {
        const showAll = args.includes('-a') || args.includes('-la') || args.includes('-al');
        const longFmt = args.includes('-l') || args.includes('-la') || args.includes('-al');
        const target = args.filter(a => !a.startsWith('-'))[0];
        const path = target ? resolvePath(target) : cwd;
        const node = getNode(path);

        if (!node) return print(`<span class="c-err">ls: cannot access '${escHtml(target)}': No such file or directory</span>`);
        if (node.type === 'file') return print(escHtml(target || path[path.length-1]));

        const entries = Object.keys(node.children);
        if (entries.length === 0) return;

        const items = showAll ? entries : entries.filter(e => !e.startsWith('.'));
        if (showAll) items.unshift('.', '..');

        if (longFmt) {
            print(`<span class="c-dim">total ${items.length}</span>`);
            for (const name of items) {
                if (name === '.' || name === '..') {
                    print(`drwxr-xr-x  <span class="c-dir">${escHtml(name)}</span>`);
                    continue;
                }
                const child = node.children[name];
                if (child.type === 'dir') {
                    print(`drwxr-xr-x  <span class="c-dir">${escHtml(name)}/</span>`);
                } else if (child.executable) {
                    print(`-rwxr-xr-x  <span class="c-exec">${escHtml(name)}</span>`);
                } else {
                    print(`-rw-r--r--  <span class="c-file">${escHtml(name)}</span>`);
                }
            }
        } else {
            const parts = items.map(name => {
                if (name === '.' || name === '..') return `<span class="c-dir">${name}</span>`;
                const child = node.children[name];
                if (child.type === 'dir') return `<span class="c-dir">${escHtml(name)}/</span>`;
                if (child.executable) return `<span class="c-exec">${escHtml(name)}</span>`;
                return `<span class="c-file">${escHtml(name)}</span>`;
            });
            print(parts.join('  '));
        }
    };

    commands.cd = (args) => {
        const target = args[0] || '~';
        const path = resolvePath(target);
        const node = getNode(path);
        if (!node) return print(`<span class="c-err">cd: no such file or directory: ${escHtml(target)}</span>`);
        if (node.type !== 'dir') return print(`<span class="c-err">cd: not a directory: ${escHtml(target)}</span>`);
        cwd = path;
        updatePrompt();
    };

    commands.cat = (args) => {
        if (!args[0]) return print(`<span class="c-err">cat: missing file operand</span>`);
        const path = resolvePath(args[0]);
        const node = getNode(path);
        if (!node) return print(`<span class="c-err">cat: ${escHtml(args[0])}: No such file or directory</span>`);
        if (node.type === 'dir') return print(`<span class="c-err">cat: ${escHtml(args[0])}: Is a directory</span>`);
        printText(node.content);
    };

    commands.pwd = () => printText(cwdString());
    commands.whoami = () => printText('enan');
    commands.date = () => printText(new Date().toString());

    commands.echo = (args) => printText(args.join(' '));

    commands.clear = () => { output.innerHTML = ''; };

    commands.history = () => {
        history.forEach((cmd, i) => {
            print(`  <span class="c-dim">${String(i + 1).padStart(4)}</span>  ${escHtml(cmd)}`);
        });
    };

    commands.ssh = (args) => {
        const targets = {
            github:   { url: 'https://github.com/Enan456', name: 'GitHub' },
            linkedin: { url: 'https://www.linkedin.com/in/enan-srivastava/', name: 'LinkedIn' },
            contact:  { url: 'mailto:contact@enan.dev', name: 'Email' },
        };
        const t = (args[0] || '').toLowerCase();
        if (!targets[t]) {
            print(`<span class="c-err">ssh: unknown host '${escHtml(args[0] || '')}'</span>`);
            print(`<span class="c-dim">Available: ssh github | ssh linkedin | ssh contact</span>`);
            return;
        }
        const { url, name } = targets[t];
        print(`<span class="c-info">Connecting to ${escHtml(name)}...</span>`);
        print(`<span class="c-green">Connection established. Opening in new tab.</span>`);
        window.open(url, '_blank');
    };

    commands.open = (args) => {
        if (!args[0]) return print(`<span class="c-err">open: missing file operand</span>`);
        const path = resolvePath(args[0]);
        const node = getNode(path);
        if (!node) return print(`<span class="c-err">open: ${escHtml(args[0])}: No such file</span>`);
        if (node.url) {
            print(`<span class="c-info">Opening ${escHtml(args[0])} in browser...</span>`);
            window.open(node.url, '_blank');
        } else {
            print(`<span class="c-warn">open: ${escHtml(args[0])}: No external link associated</span>`);
        }
    };

    commands.uname = (args) => {
        printText('EnanOS 3.2.1 portfolio x86_64 GNU/Linux');
    };

    commands.neofetch = () => {
        const art = [
            `<span class="c-cyan">       ___       </span>   <span class="c-bold">enan</span>@<span class="c-bold">portfolio</span>`,
            `<span class="c-cyan">      /   \\      </span>   <span class="c-dim">─────────────────</span>`,
            `<span class="c-cyan">     /     \\     </span>   <span class="c-bold">OS:</span> EnanOS 3.2.1 LTS`,
            `<span class="c-cyan">    / _____ \\    </span>   <span class="c-bold">Kernel:</span> 6.18.5-portfolio`,
            `<span class="c-cyan">   / /     \\ \\   </span>   <span class="c-bold">Shell:</span> esh 1.0`,
            `<span class="c-cyan">  / /   E   \\ \\  </span>   <span class="c-bold">Role:</span> Sr. AI Engineer`,
            `<span class="c-cyan">  \\ \\       / /  </span>   <span class="c-bold">Uptime:</span> since 2017`,
            `<span class="c-cyan">   \\ \\_____/ /   </span>   <span class="c-bold">Langs:</span> Python, JS, Java`,
            `<span class="c-cyan">    \\_______/    </span>   <span class="c-bold">Cloud:</span> AWS, GCP`,
            `<span class="c-cyan">                 </span>   <span class="c-bold">Email:</span> contact@enan.dev`,
        ];
        art.forEach(l => print(l));
    };

    commands.exit = async () => {
        print('<span class="c-dim">logout</span>');
        print('<span class="c-dim">Connection to portfolio closed.</span>');
        inputRow.classList.add('hidden');
        await delay(1500);
        output.innerHTML = '';
        cwd = ['~'];
        updatePrompt();
        await runBoot();
    };

    commands.sh = async (args) => {
        if (args[0] === 'animation.sh') {
            await runAnimation();
        } else if (args[0]) {
            const path = resolvePath(args[0]);
            const node = getNode(path);
            if (!node) return print(`<span class="c-err">sh: ${escHtml(args[0])}: No such file</span>`);
            if (!node.executable) return print(`<span class="c-err">sh: ${escHtml(args[0])}: Permission denied</span>`);
            await runAnimation();
        } else {
            print(`<span class="c-err">sh: missing script operand</span>`);
        }
    };

    commands.ll = (args) => commands.ls(['-la', ...args]);
    commands.la = (args) => commands.ls(['-a', ...args]);

    // ═══════════════════════════════════════════════════════════════
    // COMMAND EXECUTOR
    // ═══════════════════════════════════════════════════════════════
    async function execute(input) {
        const trimmed = input.trim();
        if (!trimmed) return;

        history.push(trimmed);
        histIdx = -1;

        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        const args = parts.slice(1);

        if (commands[cmd]) {
            await commands[cmd](args);
        } else {
            print(`<span class="c-err">command not found: ${escHtml(cmd)}</span>`);
            print(`<span class="c-dim">Type "help" for available commands.</span>`);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // TAB COMPLETION
    // ═══════════════════════════════════════════════════════════════
    function getCompletions(input) {
        const parts = input.split(/\s+/);
        const allCmds = [...Object.keys(commands), 'sh'];

        if (parts.length <= 1) {
            // Complete command names
            const prefix = parts[0] || '';
            return { type: 'cmd', matches: allCmds.filter(c => c.startsWith(prefix) && c !== prefix), prefix };
        }

        // Complete file/dir names
        const partial = parts[parts.length - 1] || '';
        let dirParts, namePrefix;

        if (partial.includes('/')) {
            const lastSlash = partial.lastIndexOf('/');
            const dirPath = partial.slice(0, lastSlash) || '.';
            namePrefix = partial.slice(lastSlash + 1);
            dirParts = resolvePath(dirPath);
        } else {
            dirParts = cwd;
            namePrefix = partial;
        }

        const dirNode = getNode(dirParts);
        if (!dirNode || dirNode.type !== 'dir') return { type: 'file', matches: [], prefix: namePrefix };

        const matches = Object.keys(dirNode.children)
            .filter(n => n.startsWith(namePrefix) && n !== namePrefix)
            .map(n => {
                const child = dirNode.children[n];
                return child.type === 'dir' ? n + '/' : n;
            });

        return { type: 'file', matches, prefix: namePrefix };
    }

    function doTabComplete() {
        const input = cmdInput.value;
        const comp = getCompletions(input);

        if (comp.matches.length === 0) return;

        if (comp.matches.length === 1) {
            const match = comp.matches[0];
            if (comp.type === 'cmd') {
                cmdInput.value = match + ' ';
            } else {
                const beforePrefix = input.slice(0, input.length - comp.prefix.length);
                cmdInput.value = beforePrefix + match;
                if (!match.endsWith('/')) cmdInput.value += ' ';
            }
        } else {
            // Show options
            const promptHtml = inputRow.querySelector('.prompt').innerHTML;
            print(`<span class="prompt">${promptHtml}</span>${escHtml(input)}`);
            print(comp.matches.map(m => {
                if (m.endsWith('/')) return `<span class="c-dir">${escHtml(m)}</span>`;
                return escHtml(m);
            }).join('  '));
            // Find common prefix
            let common = comp.matches[0];
            for (const m of comp.matches) {
                while (!m.startsWith(common)) common = common.slice(0, -1);
            }
            if (common.length > comp.prefix.length) {
                const beforePrefix = input.slice(0, input.length - comp.prefix.length);
                cmdInput.value = beforePrefix + common;
            }
        }
        updateSuggestion();
    }

    // ═══════════════════════════════════════════════════════════════
    // INLINE SUGGESTION (grey ghost text)
    // ═══════════════════════════════════════════════════════════════
    function updateSuggestion() {
        const val = cmdInput.value;
        if (!val) { suggestion.textContent = ''; return; }
        // Find most recent history match
        for (let i = history.length - 1; i >= 0; i--) {
            if (history[i].startsWith(val) && history[i] !== val) {
                suggestion.textContent = history[i].slice(val.length);
                return;
            }
        }
        suggestion.textContent = '';
    }

    // ═══════════════════════════════════════════════════════════════
    // INPUT HANDLING
    // ═══════════════════════════════════════════════════════════════
    cmdInput.addEventListener('keydown', async (e) => {
        if (appPhase !== 'shell') return;

        if (e.key === 'Tab') {
            e.preventDefault();
            doTabComplete();
            return;
        }

        if (e.key === 'Enter') {
            e.preventDefault();
            const val = cmdInput.value;
            // Print the command line to output
            const promptHtml = inputRow.querySelector('.prompt').innerHTML;
            print(`<span class="prompt">${promptHtml}</span>${escHtml(val)}`);
            cmdInput.value = '';
            suggestion.textContent = '';

            inputRow.classList.add('hidden');
            await execute(val);
            if (appPhase === 'shell') {
                inputRow.classList.remove('hidden');
                cmdInput.focus();
                output.scrollTop = output.scrollHeight;
            }
            return;
        }

        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length === 0) return;
            if (histIdx === -1) savedInput = cmdInput.value;
            histIdx = Math.min(histIdx + 1, history.length - 1);
            cmdInput.value = history[history.length - 1 - histIdx];
            updateSuggestion();
            return;
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (histIdx <= 0) {
                histIdx = -1;
                cmdInput.value = savedInput;
            } else {
                histIdx--;
                cmdInput.value = history[history.length - 1 - histIdx];
            }
            updateSuggestion();
            return;
        }

        // Accept suggestion with Right arrow at end of input
        if (e.key === 'ArrowRight' && suggestion.textContent &&
            cmdInput.selectionStart === cmdInput.value.length) {
            e.preventDefault();
            cmdInput.value += suggestion.textContent;
            suggestion.textContent = '';
            return;
        }

        // Ctrl+L = clear
        if (e.ctrlKey && e.key === 'l') {
            e.preventDefault();
            commands.clear();
            return;
        }

        // Ctrl+C = cancel current input
        if (e.ctrlKey && e.key === 'c') {
            e.preventDefault();
            const promptHtml = inputRow.querySelector('.prompt').innerHTML;
            print(`<span class="prompt">${promptHtml}</span>${escHtml(cmdInput.value)}^C`);
            cmdInput.value = '';
            suggestion.textContent = '';
            return;
        }
    });

    cmdInput.addEventListener('input', () => {
        updateSuggestion();
    });

    // Focus input when clicking terminal
    document.getElementById('terminal').addEventListener('click', () => {
        if (appPhase === 'shell') cmdInput.focus();
    });

    // ═══════════════════════════════════════════════════════════════
    // ANIMATION PLACEHOLDER (Step 2 will fill this in)
    // ═══════════════════════════════════════════════════════════════
    async function runAnimation() {
        print('<span class="c-info">Running animation.sh...</span>');
        print('<span class="c-dim">[ Animation will be added in Step 2 — press Enter to continue ]</span>');
    }

    // ═══════════════════════════════════════════════════════════════
    // BOOT SEQUENCE
    // ═══════════════════════════════════════════════════════════════
    let skipBoot = false;

    function onSkipBoot() { skipBoot = true; }

    async function runBoot() {
        appPhase = 'boot';
        skipBoot = false;
        document.addEventListener('keydown', onSkipBoot, { once: false });
        document.addEventListener('click', onSkipBoot, { once: true });

        const fast = () => skipBoot;
        const d = (ms) => fast() ? delay(0) : delay(ms);

        await d(400);
        await typeLine('[BIOS] Enan Systems v3.2.1', fast() ? 0 : 18);
        await d(200);
        await typeLine('[BIOS] Memory check... 16384 MB OK', fast() ? 0 : 15);
        await d(150);
        await typeLine('[BIOS] Detecting hardware...', fast() ? 0 : 15);
        await d(300);
        print('<span class="c-green">[OK]</span> GPU initialized');
        await d(200);
        print('<span class="c-green">[OK]</span> Network interface eth0 UP');
        await d(200);
        print('<span class="c-green">[OK]</span> Loading kernel modules...');
        await d(400);
        print('');

        // Login prompt
        await typeLine('enan-portfolio login: ', fast() ? 0 : 20);
        await d(600);
        // Type username onto the last line
        const lastLine = output.lastElementChild;
        if (lastLine) {
            for (const ch of 'enan') {
                lastLine.textContent += ch;
                if (!fast()) await delay(80);
            }
        }
        await d(300);

        await typeLine('Password: ', fast() ? 0 : 20);
        await d(400);
        const pwLine = output.lastElementChild;
        if (pwLine) {
            for (let i = 0; i < 8; i++) {
                pwLine.textContent += '*';
                if (!fast()) await delay(60);
            }
        }
        await d(500);

        print('');
        print('<span class="c-green">Authentication successful.</span>');
        await d(300);
        print('');

        const now = new Date();
        print(`<span class="c-dim">Last login: ${now.toDateString()} ${now.toLocaleTimeString()} from visitor</span>`);
        print(`Welcome to <span class="c-bold">EnanOS 3.2.1 LTS</span> (GNU/Linux 6.18.5-portfolio x86_64)`);
        print('');
        print(`  <span class="c-dim">*</span> Documentation:  <span class="c-cyan">https://enan.dev</span>`);
        print(`  <span class="c-dim">*</span> GitHub:         <span class="c-cyan">https://github.com/Enan456</span>`);
        print('');
        print(`Type <span class="c-green">"help"</span> for available commands.`);
        print('');

        document.removeEventListener('keydown', onSkipBoot);

        // Transition to shell
        appPhase = 'shell';
        inputRow.classList.remove('hidden');
        cmdInput.focus();
    }

    // ═══════════════════════════════════════════════════════════════
    // START
    // ═══════════════════════════════════════════════════════════════
    runBoot();

    </script>
